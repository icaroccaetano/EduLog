{% extends "base.html" %}

{% block title %}Login | EduLog{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100 py-4 login-wrapper">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
    <div class="card border-0 shadow-sm login-card">
      <div class="card-body p-4 p-lg-5">
        <div class="text-center mb-4 login-brand">
          <span class="login-logo-shell mx-auto">
            <img src="{{ url_for('static', path='img/logo_menu_clean.png') }}?v=2" alt="Logo EduLog" class="login-logo">
          </span>
          <p class="text-body-secondary mb-0 login-subtitle">Acesse para gerenciar aulas e manter sua rotina organizada.</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 mb-3" role="alert">
          {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login" class="vstack gap-3">
          <div>
            <label for="email" class="form-label mb-1">E-mail</label>
            <input id="email" class="form-control" type="email" name="email" required autocomplete="email" placeholder="professora@escola.com">
          </div>
          <div>
            <label for="senha" class="form-label mb-1">Senha</label>
            <input id="senha" class="form-control" type="password" name="senha" required autocomplete="current-password" placeholder="Digite sua senha">
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-1">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
