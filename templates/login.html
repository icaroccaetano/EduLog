<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>
  <h1>Login</h1>
  {% if error %}
  <p role="alert">{{ error }}</p>
  {% endif %}
  <form method="post" action="/login">
    <label>E-mail <input type="email" name="email" required></label>
    <label>Senha <input type="password" name="senha" required></label>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
